name: CI

on:
  push:
    branches:
      - main
      - ci/**
      - feat/**
      - feature/**
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  MEERKAT_BUILDBUDDY: ${{ vars.MEERKAT_BUILDBUDDY || 'false' }}

jobs:
  cargo:
    name: Cargo CI
    if: ${{ !(vars.MEERKAT_BUILDBUDDY == 'true' || vars.MEERKAT_BUILDBUDDY == '1') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository) }}
    uses: ./.github/workflows/cargo.yml
    with:
      machine_authority_base_sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event_name == 'push' && github.event.before || '' }}
      machine_authority_head_sha: ${{ github.sha }}

  buildbuddy:
    name: BuildBuddy CI
    if: ${{ (vars.MEERKAT_BUILDBUDDY == 'true' || vars.MEERKAT_BUILDBUDDY == '1') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    uses: ./.github/workflows/buildbuddy.yml
    with:
      mode: ${{ vars.MEERKAT_BUILDBUDDY_CI_MODE || 'full-fresh' }}
      machine_authority_base_sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event_name == 'push' && github.event.before || '' }}
      machine_authority_head_sha: ${{ github.sha }}
    secrets: inherit

  gate:
    name: CI gate
    if: always()
    needs: [cargo, buildbuddy]
    runs-on: ubuntu-latest
    steps:
      - name: Check selected backend
        run: |
          bb_enabled="${{ (vars.MEERKAT_BUILDBUDDY == 'true' || vars.MEERKAT_BUILDBUDDY == '1') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}"
          cargo_result="${{ needs.cargo.result }}"
          buildbuddy_result="${{ needs.buildbuddy.result }}"

          if [[ "$bb_enabled" == "true" ]]; then
            echo "BuildBuddy selected: $buildbuddy_result"
            echo "Cargo skipped: $cargo_result"
            [[ "$buildbuddy_result" == "success" && "$cargo_result" == "skipped" ]]
            exit $?
          fi

          echo "Cargo selected: $cargo_result"
          echo "BuildBuddy skipped: $buildbuddy_result"
          [[ "$cargo_result" == "success" && "$buildbuddy_result" == "skipped" ]]
