name: BuildBuddy CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:
    inputs:
      mode:
        description: BuildBuddy gate to run
        required: false
        default: full-fresh
        type: string
      changed_mode:
        description: Changed-path selector breadth
        required: false
        default: owned
        type: string
      base:
        description: Base revision for changed-committed mode
        required: false
        default: origin/main
        type: string
      paths:
        description: Whitespace or newline separated paths for changed-paths mode
        required: false
        default: ""
        type: string
    secrets:
      BUILDBUDDY_API_KEY:
        required: true
      ANTHROPIC_API_KEY:
        required: false
      RKAT_ANTHROPIC_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
      RKAT_OPENAI_API_KEY:
        required: false
      GEMINI_API_KEY:
        required: false
      RKAT_GEMINI_API_KEY:
        required: false
      GOOGLE_API_KEY:
        required: false
  workflow_dispatch:
    inputs:
      mode:
        description: BuildBuddy gate to run
        required: true
        default: full-fresh
        type: choice
        options:
          - full-fresh
          - full-warm
          - workspace-fresh
          - workspace-warm
          - native-build-clippy
          - native-unit-tests
          - native-integration-fast
          - e2e-system
          - fmt-static
          - cargo-all-features-clippy
          - feature-clippy
          - unused-deps
          - sdk-suites
          - rust-release-packaging
          - machine-authority
          - rmat-audit
          - seam-inventory
          - wasm-contract
          - e2e-fast
          - e2e-live
          - e2e-smoke
          - minimal-feature-builds
          - feature-matrix-lib
          - feature-matrix-surface
          - wasm-check
          - security-audit
          - changed-committed
          - changed-paths
      changed_mode:
        description: Changed-path selector breadth
        required: true
        default: owned
        type: choice
        options:
          - owned
          - affected
      base:
        description: Base revision for changed-committed mode
        required: false
        default: origin/main
        type: string
      paths:
        description: Whitespace or newline separated paths for changed-paths mode
        required: false
        type: string

permissions:
  contents: read

env:
  CARGO_HOME: /tmp/meerkat-cargo-home

jobs:
  doctor:
    name: BuildBuddy doctor
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || (vars.MEERKAT_BUILDBUDDY_CI == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)) }}
    runs-on: ubuntu-latest
    env:
      BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup BuildBuddy CI
        uses: ./.github/actions/setup-buildbuddy-ci

      - name: BuildBuddy doctor
        run: make buildbuddy-doctor

  native:
    name: ${{ matrix.label }}
    needs: doctor
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || (vars.MEERKAT_BUILDBUDDY_CI == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)) }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: native-build-clippy
            label: Build + clippy (Bazel/RBE)
          - lane: native-unit-tests
            label: Unit tests (Bazel/RBE)
          - lane: native-integration-fast
            label: Integration-fast lane (Bazel/RBE)
          - lane: native-e2e-system
            label: E2E system lane (Bazel/RBE)
    env:
      BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
      MEERKAT_CLEAN_E2E_SCENARIO_TARGETS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup BuildBuddy CI
        uses: ./.github/actions/setup-buildbuddy-ci

      - name: Run ${{ matrix.label }}
        env:
          MEERKAT_BUILDBUDDY_CI_MODE: ${{ inputs.mode }}
          MEERKAT_BUILDBUDDY_LOG_ROOT: ${{ runner.temp }}/buildbuddy-logs
        run: |
          mkdir -p "${MEERKAT_BUILDBUDDY_LOG_ROOT}"
          export MEERKAT_BUILDBUDDY_CI_MODE="${MEERKAT_BUILDBUDDY_CI_MODE:-${{ vars.MEERKAT_BUILDBUDDY_CI_MODE || 'full-fresh' }}}"
          scripts/buildbuddy-ci-lane "${{ matrix.lane }}"

      - name: Upload BuildBuddy logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildbuddy-${{ matrix.lane }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/buildbuddy-logs
          if-no-files-found: ignore

  compatibility:
    name: ${{ matrix.label }}
    needs: doctor
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || (vars.MEERKAT_BUILDBUDDY_CI == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)) }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: fmt-static
            label: Format, lint, and static checks (compat)
          - lane: cargo-all-features-clippy
            label: Clippy all features (compat)
          - lane: feature-clippy
            label: Clippy feature matrix (compat)
          - lane: unused-deps
            label: Unused dependency audit (compat)
          - lane: sdk-suites
            label: SDK suites + parity gates (compat)
          - lane: rust-release-packaging
            label: Rust release packaging (compat)
          - lane: machine-authority
            label: Machine authority workflow (compat)
          - lane: rmat-audit
            label: RMAT audit + ownership ledger (compat)
          - lane: seam-inventory
            label: Seam inventory (strict) (compat)
          - lane: wasm-contract
            label: WASM contract tests (compat)
          - lane: e2e-fast
            label: E2E fast lane (compat)
          - lane: e2e-live
            label: E2E live lane (compat)
          - lane: e2e-smoke
            label: E2E smoke lane (compat)
          - lane: minimal-feature-builds
            label: Minimal feature builds (compat)
          - lane: feature-matrix-lib
            label: Feature matrix (library) (compat)
          - lane: feature-matrix-surface
            label: Feature matrix (surface checks) (compat)
          - lane: wasm-check
            label: WASM compilation check (compat)
          - lane: security-audit
            label: Security audit (compat)
    env:
      BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      RKAT_ANTHROPIC_API_KEY: ${{ secrets.RKAT_ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RKAT_OPENAI_API_KEY: ${{ secrets.RKAT_OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      RKAT_GEMINI_API_KEY: ${{ secrets.RKAT_GEMINI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      MEERKAT_CLEAN_E2E_SCENARIO_TARGETS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup BuildBuddy CI
        uses: ./.github/actions/setup-buildbuddy-ci

      - name: Run ${{ matrix.label }}
        env:
          MEERKAT_BUILDBUDDY_CI_MODE: ${{ inputs.mode }}
          MEERKAT_BUILDBUDDY_LOG_ROOT: ${{ runner.temp }}/buildbuddy-logs
        run: |
          mkdir -p "${MEERKAT_BUILDBUDDY_LOG_ROOT}"
          export MEERKAT_BUILDBUDDY_CI_MODE="${MEERKAT_BUILDBUDDY_CI_MODE:-${{ vars.MEERKAT_BUILDBUDDY_CI_MODE || 'full-fresh' }}}"
          scripts/buildbuddy-ci-lane "${{ matrix.lane }}"

      - name: Upload BuildBuddy logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildbuddy-${{ matrix.lane }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/buildbuddy-logs
          if-no-files-found: ignore

  changed-gate:
    name: Changed-path gate (Bazel/RBE)
    needs: doctor
    if: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && (inputs.mode == 'changed-committed' || inputs.mode == 'changed-paths') }}
    runs-on: ubuntu-latest
    env:
      BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup BuildBuddy CI
        uses: ./.github/actions/setup-buildbuddy-ci

      - name: Changed-path gate
        env:
          MEERKAT_BUILDBUDDY_CI_MODE: ${{ inputs.mode }}
          MEERKAT_BUILDBUDDY_CHANGED_MODE: ${{ inputs.changed_mode || vars.MEERKAT_BUILDBUDDY_CHANGED_MODE || 'owned' }}
          MEERKAT_BUILDBUDDY_BASE: ${{ inputs.base || vars.MEERKAT_BUILDBUDDY_BASE || 'origin/main' }}
          MEERKAT_BUILDBUDDY_CHANGED_PATHS: ${{ inputs.paths || vars.MEERKAT_BUILDBUDDY_CHANGED_PATHS || '' }}
          MEERKAT_BUILDBUDDY_LOG_ROOT: ${{ runner.temp }}/buildbuddy-logs
        run: |
          set -o pipefail
          mkdir -p "${MEERKAT_BUILDBUDDY_LOG_ROOT}"
          scripts/buildbuddy-ci-dispatch 2>&1 | tee "${MEERKAT_BUILDBUDDY_LOG_ROOT}/dispatch.log"

      - name: Upload BuildBuddy logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildbuddy-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/buildbuddy-logs
          if-no-files-found: ignore

  gate:
    name: BuildBuddy CI gate
    needs: [doctor, native, compatibility]
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || (vars.MEERKAT_BUILDBUDDY_CI == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository))) }}
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.doctor.result }}" != "success" ||
                "${{ needs.native.result }}" != "success" ||
                "${{ needs.compatibility.result }}" != "success" ]]; then
            echo "BuildBuddy CI failed"
            exit 1
          fi
