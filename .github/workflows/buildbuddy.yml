name: BuildBuddy CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:
    inputs:
      mode:
        description: BuildBuddy gate to run
        required: false
        default: full-fresh
        type: string
      changed_mode:
        description: Changed-path selector breadth
        required: false
        default: owned
        type: string
      base:
        description: Base revision for changed-committed mode
        required: false
        default: origin/main
        type: string
      paths:
        description: Whitespace or newline separated paths for changed-paths mode
        required: false
        default: ""
        type: string
    secrets:
      BUILDBUDDY_API_KEY:
        required: true
      ANTHROPIC_API_KEY:
        required: false
      RKAT_ANTHROPIC_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
      RKAT_OPENAI_API_KEY:
        required: false
      GEMINI_API_KEY:
        required: false
      RKAT_GEMINI_API_KEY:
        required: false
      GOOGLE_API_KEY:
        required: false
  workflow_dispatch:
    inputs:
      mode:
        description: BuildBuddy gate to run
        required: true
        default: full-fresh
        type: choice
        options:
          - full-fresh
          - full-warm
          - workspace-fresh
          - workspace-warm
          - native-build-clippy
          - native-unit-tests
          - native-integration-fast
          - e2e-system
          - fmt-static
          - cargo-all-features-clippy
          - feature-clippy
          - unused-deps
          - sdk-suites
          - rust-release-packaging
          - machine-authority
          - rmat-audit
          - seam-inventory
          - wasm-contract
          - e2e-fast
          - e2e-live
          - e2e-smoke
          - minimal-feature-builds
          - feature-matrix-lib
          - feature-matrix-surface
          - wasm-check
          - security-audit
          - changed-committed
          - changed-paths
      changed_mode:
        description: Changed-path selector breadth
        required: true
        default: owned
        type: choice
        options:
          - owned
          - affected
      base:
        description: Base revision for changed-committed mode
        required: false
        default: origin/main
        type: string
      paths:
        description: Whitespace or newline separated paths for changed-paths mode
        required: false
        type: string

permissions:
  contents: read

env:
  CARGO_HOME: /tmp/meerkat-cargo-home
  BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  RKAT_ANTHROPIC_API_KEY: ${{ secrets.RKAT_ANTHROPIC_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  RKAT_OPENAI_API_KEY: ${{ secrets.RKAT_OPENAI_API_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  RKAT_GEMINI_API_KEY: ${{ secrets.RKAT_GEMINI_API_KEY }}
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  MEERKAT_CLEAN_E2E_SCENARIO_TARGETS: "1"

jobs:
  doctor:
    name: BuildBuddy doctor
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || (vars.MEERKAT_BUILDBUDDY_CI == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup BuildBuddy CI
        uses: ./.github/actions/setup-buildbuddy-ci
        with:
          profile: doctor

      - name: BuildBuddy doctor
        run: make buildbuddy-doctor

  bb-build-clippy:
    name: Build + clippy (Bazel/RBE)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || (vars.MEERKAT_BUILDBUDDY_CI == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/run-buildbuddy-ci-lane
        with:
          lane: native-build-clippy
          profile: native
          mode: ${{ inputs.mode || vars.MEERKAT_BUILDBUDDY_CI_MODE || 'full-fresh' }}

  bb-unit-tests:
    name: Unit tests (Bazel/RBE)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || (vars.MEERKAT_BUILDBUDDY_CI == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)) }}
